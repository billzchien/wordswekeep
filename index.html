<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Words We Keep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro&family=Geist:wght@600&family=Geist+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #F5F5F5;
      color: #000;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-user-select: none;
      user-select: none;
    }

    .page {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 40px;
      width: 320px;
      margin-top: -5vh;
    }

    .title {
      font-family: 'Geist', sans-serif;
      font-weight: 600;
      font-size: 18px;
      line-height: 1.99;
      letter-spacing: -0.4px;
      white-space: nowrap;
    }

    .body-text {
      display: flex;
      flex-direction: column;
      gap: 24px;
      font-family: 'Crimson Pro', serif;
      font-weight: 400;
      font-size: 20px;
      line-height: 22px;
      letter-spacing: -0.2px;
    }

    .body-text .align-right {
      text-align: right;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      padding: 8px 12px;
      width: 100%;
      text-decoration: none;
      cursor: pointer;
    }

    .btn > span {
      font-family: 'Geist Mono', monospace;
      font-weight: 400;
      font-size: 12px;
      line-height: 1.99;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #fff;
    }

    .btn .cell {
      display: inline-block;
    }

    .footer {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Geist Mono', monospace;
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 0.72px;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
    }

    .footer a {
      color: #000;
      text-decoration: none;
      position: relative;
    }

    .footer a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -1px;
      width: 100%;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .footer a:hover::after {
      transform: scaleX(1);
    }

    @media (max-width: 480px) {
      .page {
        padding: 0 36px;
      }

      .content {
        width: 100%;
      }

      .btn {
        position: fixed;
        left: 36px;
        right: 36px;
        width: auto;
        height: 40px;
        bottom: 71.5px;
      }

      .btn span {
        letter-spacing: 0.96px;
      }

      .footer {
        position: fixed;
        bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">
      <p class="title">Words We Keep</p>
      <div class="body-text">
        <p>Words are powerful. <br>Some arrive exactly when you need them. They stop you, inspire you, <br>stay with you.</p>
        <p class="align-right">From every time, <br>every culture, <br>every corner of life.</p>
        <p>If you remember those words, <br>share them here.</p>
      </div>
      <a class="btn" role="button" onclick="window.location.href='https://forms.gle/uLNipYUT6cnNmigw5'" style="cursor:pointer;">
        <span>Add words</span>
      </a>
    </div>
    <p class="footer">
      a project by <a href="https://www.billchien.net" target="_blank" rel="noopener noreferrer">Bill</a> &amp; <a href="https://www.rohanrege.com/" target="_blank" rel="noopener noreferrer">Rohan</a>. Coming soon.
    </p>
  </div>

  <script>
    const desktopHover = window.matchMedia(
      '(hover: hover) and (pointer: fine) and (min-width: 1024px)'
    ).matches;
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if (!reduceMotion) {
      const RADIUS = 40;
      const STRENGTH = 12;

      // Fixed overlay that holds per-character spans for the repulsion effect.
      // The original text nodes are hidden in-place (visibility:hidden) so the
      // browser still lays out the text — including kerning — and we measure each
      // character's exact rect via the Range API, then position overlay spans on top.
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;pointer-events:none;';
      document.body.appendChild(overlay);

      let chars = []; // { span, tn, i } — tn = text node, i = char index

      const processElement = (el) => {
        // Collect all text nodes first — mutating the DOM during traversal causes
        // the TreeWalker to skip nodes after each replacement.
        const textNodes = [];
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
        let node;
        while ((node = walker.nextNode())) {
          if (node.textContent.trim()) textNodes.push(node);
        }

        textNodes.forEach((node) => {
          const text = node.textContent;
          const cs = getComputedStyle(node.parentElement);

          // Keep text in DOM (for layout/kerning) but make it invisible.
          const hidden = document.createElement('span');
          hidden.style.visibility = 'hidden';
          const tn = document.createTextNode(text);
          hidden.appendChild(tn);
          node.replaceWith(hidden);

          for (let i = 0; i < text.length; i++) {
            if (/\s/.test(text[i])) continue;

            const range = document.createRange();
            range.setStart(tn, i);
            range.setEnd(tn, i + 1);
            const r = range.getBoundingClientRect();

            const span = document.createElement('span');
            span.textContent = text[i];
            span.style.cssText = [
              'position:fixed',
              `left:${r.left}px`,
              `top:${r.top}px`,
              `font-family:${cs.fontFamily}`,
              `font-size:${cs.fontSize}`,
              `font-weight:${cs.fontWeight}`,
              `line-height:${cs.lineHeight}`,
              `letter-spacing:${cs.letterSpacing}`,
              `color:${cs.color}`,
              'pointer-events:none',
              'will-change:transform',
              'transition:transform 0.5s cubic-bezier(0.16,1,0.3,1)',
            ].join(';');
            overlay.appendChild(span);
            span._cx = r.left + r.width / 2;
            span._cy = r.top + r.height / 2;

            chars.push({ span, tn, i });
          }
        });
      };

      document.querySelectorAll('.title, .body-text p').forEach(processElement);


      // Re-measure after fonts load or on resize so overlay stays aligned.
      const remeasure = () => {
        chars.forEach(({ span }) => {
          span.style.transition = 'none';
          span.style.transform = '';
        });
        document.body.offsetHeight; // force reflow before measuring
        chars.forEach(({ span, tn, i }) => {
          const range = document.createRange();
          range.setStart(tn, i);
          range.setEnd(tn, i + 1);
          const r = range.getBoundingClientRect();
          span.style.left = r.left + 'px';
          span.style.top = r.top + 'px';
          span._cx = r.left + r.width / 2;
          span._cy = r.top + r.height / 2;
        });
        requestAnimationFrame(() => {
          chars.forEach(({ span }) => {
            span.style.transition = 'transform 0.5s cubic-bezier(0.16,1,0.3,1)';
          });
        });
      };

      document.fonts.ready.then(remeasure);
      window.addEventListener('load', remeasure);
      window.addEventListener('resize', remeasure);

      const applyRepulsion = (clientX, clientY) => {
        chars.forEach(({ span }) => {
          const dx = span._cx - clientX;
          const dy = span._cy - clientY;
          const dist = Math.hypot(dx, dy);
          if (dist < RADIUS) {
            const force = (1 - dist / RADIUS) * STRENGTH;
            span.style.transform = `translate(${(dx / (dist || 1)) * force}px,${(dy / (dist || 1)) * force}px)`;
          } else {
            span.style.transform = '';
          }
        });
      };

      const clearRepulsion = () => {
        chars.forEach(({ span }) => { span.style.transform = ''; });
      };

      window.addEventListener('mousemove', (e) => applyRepulsion(e.clientX, e.clientY));
      document.addEventListener('mouseleave', clearRepulsion);

      window.addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        applyRepulsion(t.clientX, t.clientY);
      }, { passive: true });
      window.addEventListener('touchend', clearRepulsion);
      window.addEventListener('touchcancel', clearRepulsion);

      window.addEventListener('orientationchange', remeasure);

      // CTA: on desktop, animate on hover; on touch, play once on load.
      if (desktopHover) {
        const btn = document.querySelector('.btn');
        const label = btn.querySelector('span');
        const STEP = 26;

        const originalText = label.textContent;
        const cells = [];
        label.textContent = '';
        [...originalText].forEach((ch) => {
          if (ch === ' ') {
            label.appendChild(document.createTextNode(' '));
          } else {
            const cell = document.createElement('span');
            cell.className = 'cell';
            cell.textContent = ch;
            cells.push(cell);
            label.appendChild(cell);
          }
        });

        let timers = [];
        const animateLabel = () => {
          timers.forEach(clearTimeout);
          timers = [];
          const eraseDone = cells.length * STEP;
          cells.forEach((cell, i) => {
            timers.push(setTimeout(() => { cell.style.opacity = '0'; }, i * STEP));
            timers.push(setTimeout(() => { cell.style.opacity = '1'; }, eraseDone + i * STEP));
          });
        };

        btn.addEventListener('mouseenter', () => { animateLabel(); });
        btn.addEventListener('mouseleave', () => { animateLabel(); });
      } else {
        // Touch devices: play the animation once on load.
        const btn = document.querySelector('.btn');
        const label = btn.querySelector('span');
        const STEP = 26;

        const originalText = label.textContent;
        const cells = [];
        label.textContent = '';
        [...originalText].forEach((ch) => {
          if (ch === ' ') {
            label.appendChild(document.createTextNode(' '));
          } else {
            const cell = document.createElement('span');
            cell.className = 'cell';
            cell.textContent = ch;
            cells.push(cell);
            label.appendChild(cell);
          }
        });

        document.fonts.ready.then(() => {
          const eraseDone = cells.length * STEP;
          cells.forEach((cell, i) => {
            setTimeout(() => { cell.style.opacity = '0'; }, i * STEP);
            setTimeout(() => { cell.style.opacity = '1'; }, eraseDone + i * STEP);
          });
        });
      }
    }
  </script>
</body>
</html>
